// Relativity tunables. Delete a line to use the code default. ModuleManager-patchable.
RELATIVITY
{
	betaMin = 0.01      // activation gate: below this β the mechanic is off (§2.6 i)
	betaSane = 0.999    // kraken/NaN ceiling: at/above this β the mechanic disables (§2.6 iii)
	debugMode = true	// true = per-engine AddForce census + extra diagnostics + dev tuning sliders; false = one aggregated line
	kerbalismDilation = true   // scale ALL Kerbalism-timed resource flows ×1/γ: metabolism (food/water/O2), processes (scrubber/fuel-cell/reactor/ISRU), unloaded-vessel background gen/drain. Symmetric (production+consumption). Radiation dose stays ×1.00; loaded stock part-module EC stays real-time.
	attitudeExponent = 2       // TORQUE ×1/γ^this on reaction wheels/RCS (§2.7). 2 = a torque-limited turn takes ~γ× longer (physical rate ×1/γ); 1 gives only ~√γ×. 0 disables

	// Kerbalism rules left at coordinate time (comma-separated). Stock + ROKerbalism name it "radiation".
	kerbalismExcludedRules = radiation
	// ITorqueProvider modules NOT slowed by attitude ×1/γ. Every other torque provider (stock or modded
	// reaction wheels / RCS) is auto-discovered and scaled — add a module here to exempt it.
	attitudeSkipModules = ModuleControlSurface, ModuleAeroSurface, ModuleGimbal

	// RP-1 only: push a crew's retirement date forward by the dilation so retirement counts the crew's
	// proper time, not calendar time. Independent of RP-1's (capped) interesting-flight extension.
	rp1RetirementDilation = true

	// Felt gravity from sustained thrust: Kerbalism's "gravity" comfort is landed/gravity-ring based, not
	// g-measured, so this credits a sustained-thrust cruise as artificial gravity (reduces crew stress).
	feltGravityComfort = true    // sustained thrust in the [threshold, max] g band counts as Kerbalism "gravity" comfort
	feltGravityThreshold = 0.1   // MIN felt g (Σthrust/mass) to count as gravity comfort
	feltGravityMax = 1.5         // MAX felt g — above this the acceleration is too harsh to be "comfortable"

	// Tier 1 relativistic Doppler visual (§2.5): forward blueshift / aft redshift + beaming, applied as a
	// screen post-process near c. Needs the shader bundle at Shaders/relativityvisual.bundle (build via
	// unity-shaders/); absent it, the visual is simply off. Gates off below betaMin and under warp.
	// The look itself is FIXED (Planck eye-band brightness, beam floor, full white bleed —
	// finalized in-game 2026-07). Player-facing knobs are just these two; the advanced keys
	// (dopplerBeamMin/WhiteBleed/Dither/CubeMipBias/BeamCap/HighlightGuard/EdgeAA/Intensity)
	// still exist for ModuleManager patches but are deliberately not listed here.
	dopplerVisual = true         // false = never load/apply the visual
	dopplerSkyGrade = true       // grade the sky BEFORE the ship draws (the default path since 2026-07-15): ship/plumes/sunflare keep their stock look by draw order, coexists with Scatterer TAA, and is faster. false = the pre-promotion post-frame path (kept as a fallback for one release — report if you need it)
	dopplerForceHDR = true       // force allowHDR on the flight camera STACK (galaxy+scaled+near) while the layer is ACTIVE — float buffers keep the sky un-quantized before beaming amplifies it (the shader's SoftClip acts as the tonemapper stock lacks). Sub-relativistic play keeps the stock LDR stack; restored on deactivation/detach. false = leave cameras as-is
	dopplerColorStrength = 1.0   // hue-shift strength: 1.0 = physically exact timing (the sky dims aft faster than it reddens); raise (e.g. 2.0) to make the red/blue colour arrive ahead of the dimming
	dopplerAberration = true     // star-bunching screen distortion: warps the GALAXY camera's skybox output via a one-time galaxy cubemap (size = the "Aberration sky detail" setting in Difficulty Options) plus a live rear-detail camera above beta 0.5. Planets/plumes/ship draw after that camera, so they are structurally untouched. false = colour/beaming only
	dopplerBodyWarp = true       // also aberrate the apparent DIRECTION of planets/moons/sun (scaled space) so they sit consistently in the bunched starfield; direction only — distance/size preserved. false = bodies stay at their true bearings
	dopplerVesselMask = true     // keep engine plumes (and other vessel transparents) at their stock colour: a hidden camera re-renders the plume layer (the hull is a depth-only occluder) so the depth-less additive plumes stop being tinted/beamed with the background. Runs only while engine/RCS thrust is flowing — a coasting ship pays nothing. false = plumes ride the sky effect
	dopplerHeadlight = 0.05      // forward "headlight": the beamed blue-white forward sky lights the vessel like a real source — intensity ramps with speed through a capped curve (no beta can overexpose the hull), colour matches the sky's forward tint. 0 = off; the ceiling is the MM-only dopplerHeadlightMax
	dopplerSunlight = true       // aim the sunlight from the sun's APPARENT (aberrated) position and Doppler it: hull shading/shadows match where the sun is drawn on screen, sunlight reddens+dims as the sun falls aft (never brightens forward), and near c the headlight takes over as the dominant light. Visual only — solar panels read body positions, not this light. false = sunlight stays at the true bearing/strength
}
