// 옵션 파츠 — 프리스비를 복제해 배기속도를 0.8c로 올린 상대론 순항용 토치 (FFT 필요, GameData/Relativity/Extras 삭제로 제거)
//
// Why this exists: Relativity's core "ships no drive". But FFT's Frisbee (ve ≈ 0.082c) needs a ~660,000:1
// mass ratio to reach β = 0.8, so the relativistic regime this mod models is practically unreachable
// sublight. This optional add-on clones the Frisbee and raises the exhaust velocity to ve ≈ 0.8c
// (Isp ≈ 24,457,000 s at vacuum), so a normal ship reaches β = 0.8 at a mass ratio of only ~4:1 — the
// mod becomes playable near c. Same model, same propellants (Antimatter + LqdHydrogen), same SystemHeat
// cooling as the Frisbee; only thrust (→ 5000 kN) and the Isp curve change. Delete this file to remove it.
//
// Needs FarFutureTechnologies (it clones an FFT part); ModuleManager applies it. No effect if FFT is absent.

+PART[fft-antimatter-beam-1]:NEEDS[FarFutureTechnologies]
{
	@name = relativity-torch-1
	@title = R-1 'Lorentz' Relativistic Torch
	@manufacturer = Relativity
	@description = A Relativity add-on: the Frisbee beam-core annihilation drive tuned to a near-relativistic exhaust (ve about 0.8c) so an ordinary ship can actually reach the relativistic regime this mod models. Burns the same Antimatter + Liquid Hydrogen; needs the same radiators. Optional - delete GameData/Relativity/Extras to remove.
	@entryCost *= 4
	@cost *= 4

	@MODULE[ModuleEnginesFX]
	{
		@maxThrust = 5000
		@atmosphereCurve
		{
			@key,0 = 0 24457000
			@key,1 = 1 489000
			@key,2 = 12 0.01
		}
	}
}
