// Relativity tunables. Delete a line to use the code default. ModuleManager-patchable.
RELATIVITY
{
	betaMin = 0.01      // activation gate: below this β the mechanic is off (§2.6 i)
	betaSane = 0.995    // kraken/NaN ceiling: at/above this β the mechanic disables (§2.6 iii)
	debugMode = false   // true = per-engine AddForce census + extra diagnostics; false = one aggregated line
	kerbalismDilation = true   // scale Kerbalism metabolic resource use (food/water/O2/…) ×1/γ; radiation dose stays ×1.00
	attitudeExponent = 1       // reaction-wheel/RCS rotational authority ×1/γ^this (§2.7); 0 disables

	// Kerbalism rules left at coordinate time (comma-separated). Stock + ROKerbalism name it "radiation".
	kerbalismExcludedRules = radiation
	// ITorqueProvider modules NOT slowed by attitude ×1/γ. Every other torque provider (stock or modded
	// reaction wheels / RCS) is auto-discovered and scaled — add a module here to exempt it.
	attitudeSkipModules = ModuleControlSurface, ModuleAeroSurface, ModuleGimbal

	// RP-1 only: push a crew's retirement date forward by the dilation so retirement counts the crew's
	// proper time, not calendar time. Independent of RP-1's (capped) interesting-flight extension.
	rp1RetirementDilation = true
}
